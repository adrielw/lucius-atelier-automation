name: IG Test Post 20260420-0920
on:
  workflow_dispatch:
jobs:
  post-ig-test:
    runs-on: ubuntu-latest
    steps:
      - name: Post test image to Instagram
        env:
          META_PAGE_TOKEN: ${{ secrets.META_PAGE_TOKEN }}
        run: |
          python3 - <<'PYEOF'
          import os, requests, base64
          ig_user_id = '17841407373444033'
          token = os.environ['META_PAGE_TOKEN']
          image_url = 'https://raw.githubusercontent.com/adrielw/lucius-atelier-automation/main/ig-images/test/nb2-shop-reviews_2026-02-23_jeremiah_01-2026-04-17.jpg'
          caption = base64.b64decode('RXZlcnkgbW9kIHRlbGxzIGEgc3RvcnkuIFRoaXMgb25lIHN0YXJ0cyB3aXRoIHRoZSByaWdodCBwYXJ0cy4KCiNMdWNpdXNBdGVsaWVyICNTZWlrb01vZCAjV2F0Y2hNb2QgI1dhdGNoRmFtICNTZWlrbyAjTW9kV2F0Y2g=').decode('utf-8')
          r = requests.post(
              'https://graph.facebook.com/v25.0/' + ig_user_id + '/media',
              data={'image_url': image_url, 'caption': caption, 'access_token': token}
          )
          print('Container: ' + str(r.status_code) + ' ' + r.text)
          r.raise_for_status()
          creation_id = r.json()['id']
          r2 = requests.post(
              'https://graph.facebook.com/v25.0/' + ig_user_id + '/media_publish',
              data={'creation_id': creation_id, 'access_token': token}
          )
          print('Publish: ' + str(r2.status_code) + ' ' + r2.text)
          r2.raise_for_status()
          print('IG Post ID: ' + r2.json()['id'])
          PYEOF
